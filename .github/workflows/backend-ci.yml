name: Backend PR Checks

on:
  pull_request:
    paths:
      - "backEnd/**"
      - ".github/workflows/backend-pr.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backEnd/main

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backEnd/main/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff flake8

      - name: Ruff
        run: python -m ruff check .

      - name: Flake8
        run: python -m flake8 .

      - name: Django Check
        run: python manage.py check
